<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — TEDxUAP</title>
<link rel="stylesheet" href="../css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase-client.js"></script>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">

<div style="width:100%;max-width:420px;padding:20px">
  <div class="detail-card" style="padding:44px 36px;position:relative;overflow:hidden;border-radius:24px">
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(137,0,0,.18),transparent 70%);pointer-events:none"></div>

    <!-- Logo -->
    <div style="position:relative;z-index:1;text-align:center;margin-bottom:36px">
      <div style="margin-bottom:6px">
        <span class="nav-logo-ted" style="font-size:2.2rem">TED</span><span class="nav-logo-x" style="font-size:2.2rem">x</span>
      </div>
      <div style="color:var(--text-faint);font-size:.66rem;letter-spacing:.15em;text-transform:uppercase">Admin Panel</div>
    </div>

    <h2 style="font-size:1.25rem;font-weight:700;text-align:center;margin-bottom:4px;position:relative;z-index:1">Welcome Back</h2>
    <p style="color:var(--text-dim);font-size:.82rem;text-align:center;margin-bottom:28px;position:relative;z-index:1">Sign in with your admin account</p>

    <!-- Error -->
    <div id="loginError" style="background:rgba(220,38,38,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;font-size:.8rem;padding:11px 14px;border-radius:10px;margin-bottom:18px;display:none;position:relative;z-index:1;line-height:1.5"></div>

    <!-- Success -->
    <div id="loginSuccess" style="background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac;font-size:.8rem;padding:11px 14px;border-radius:10px;margin-bottom:18px;display:none;position:relative;z-index:1;line-height:1.5"></div>

    <!-- Login Form -->
    <div id="loginForm" style="position:relative;z-index:1">
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label" style="font-size:.78rem;margin-bottom:6px;display:block">Email Address</label>
        <input type="email" id="loginEmail" class="form-input" placeholder="admin@tedxuap.com"
          onkeydown="if(event.key==='Enter') document.getElementById('loginPass').focus()"
          style="width:100%;box-sizing:border-box">
      </div>
      <div class="form-group" style="margin-bottom:8px">
        <label class="form-label" style="font-size:.78rem;margin-bottom:6px;display:block">Password</label>
        <div style="position:relative">
          <input type="password" id="loginPass" class="form-input" placeholder="••••••••"
            onkeydown="if(event.key==='Enter') doLogin()"
            style="width:100%;box-sizing:border-box;padding-right:44px">
          <button onclick="togglePass()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim);font-size:.85rem;padding:4px" id="eyeBtn">👁</button>
        </div>
      </div>

      <div style="text-align:right;margin-bottom:22px">
        <button onclick="showForgot()" style="background:none;border:none;cursor:pointer;color:var(--red);font-size:.76rem;padding:0">Forgot password?</button>
      </div>

      <button onclick="doLogin()" class="btn-primary" id="loginBtn" style="width:100%;justify-content:center;font-size:.9rem;padding:13px">
        <span id="loginBtnContent">Sign In</span>
      </button>
    </div>

    <!-- Forgot Password Form -->
    <div id="forgotForm" style="position:relative;z-index:1;display:none">
      <div style="margin-bottom:20px;padding:14px;background:rgba(255,255,255,.04);border-radius:10px;border:1px solid rgba(255,255,255,.07)">
        <p style="font-size:.8rem;color:var(--text-dim);margin:0;line-height:1.6">Enter your admin email and we'll send a password reset link.</p>
      </div>
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label" style="font-size:.78rem;margin-bottom:6px;display:block">Email Address</label>
        <input type="email" id="resetEmail" class="form-input" placeholder="admin@tedxuap.com"
          onkeydown="if(event.key==='Enter') doReset()"
          style="width:100%;box-sizing:border-box">
      </div>
      <button onclick="doReset()" class="btn-primary" id="resetBtn" style="width:100%;justify-content:center;margin-bottom:12px">
        <span id="resetBtnContent">Send Reset Link</span>
      </button>
      <button onclick="showLogin()" style="width:100%;background:none;border:1px solid rgba(255,255,255,.1);color:var(--text-dim);padding:11px;border-radius:10px;cursor:pointer;font-size:.82rem">
        ← Back to Sign In
      </button>
    </div>

    <a href="../index.html" style="display:block;text-align:center;color:var(--text-faint);font-size:.75rem;text-decoration:none;margin-top:24px;position:relative;z-index:1">← Back to Website</a>
  </div>
</div>

<script>
// Redirect if already logged in via Supabase session
(async function(){
  try {
    const sess = await window.db.getSession();
    if (sess) { window.location.href = 'dashboard.html'; }
  } catch(e) {}
})();

function togglePass() {
  var inp = document.getElementById('loginPass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function showError(msg) {
  var el = document.getElementById('loginError');
  el.innerHTML = msg;
  el.style.display = 'block';
  document.getElementById('loginSuccess').style.display = 'none';
}
function showSuccessMsg(msg) {
  var el = document.getElementById('loginSuccess');
  el.innerHTML = msg;
  el.style.display = 'block';
  document.getElementById('loginError').style.display = 'none';
}
function clearMessages() {
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('loginSuccess').style.display = 'none';
}

function showForgot() {
  clearMessages();
  document.getElementById('loginForm').style.display = 'none';
  document.getElementById('forgotForm').style.display = 'block';
  var em = document.getElementById('loginEmail').value;
  if (em) document.getElementById('resetEmail').value = em;
}
function showLogin() {
  clearMessages();
  document.getElementById('forgotForm').style.display = 'none';
  document.getElementById('loginForm').style.display = 'block';
}

async function doLogin() {
  clearMessages();
  var email = document.getElementById('loginEmail').value.trim();
  var pass  = document.getElementById('loginPass').value;

  if (!email) { showError('Please enter your email address.'); document.getElementById('loginEmail').focus(); return; }
  if (!pass)  { showError('Please enter your password.'); document.getElementById('loginPass').focus(); return; }

  var btn = document.getElementById('loginBtn');
  var content = document.getElementById('loginBtnContent');
  btn.disabled = true;
  content.innerHTML = '<span class="spinner" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></span>Signing in…';

  try {
    await window.db.signIn(email, pass);
    content.innerHTML = '✓ Redirecting…';
    window.location.href = 'dashboard.html';
  } catch(e) {
    var msg = e.message || 'Sign in failed. Check your credentials.';
    if (msg.includes('Invalid login credentials')) msg = 'Incorrect email or password. Please try again.';
    if (msg.includes('Email not confirmed'))       msg = 'Please confirm your email first. Check your inbox.';
    if (msg.includes('Too many requests'))         msg = 'Too many attempts. Please wait a moment and try again.';
    showError(msg);
    btn.disabled = false;
    content.textContent = 'Sign In';
  }
}

async function doReset() {
  clearMessages();
  var email = document.getElementById('resetEmail').value.trim();
  if (!email) { showError('Please enter your email address.'); return; }

  var btn = document.getElementById('resetBtn');
  var content = document.getElementById('resetBtnContent');
  btn.disabled = true;
  content.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></span>Sending…';

  try {
    if (!window.db.client) throw new Error('Not connected to database');
    const { error } = await window.db.client.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/admin/reset-password.html'
    });
    if (error) throw error;
    showSuccessMsg('✓ Reset link sent! Check your email inbox (and spam folder).');
    document.getElementById('resetEmail').value = '';
  } catch(e) {
    showError(e.message || 'Could not send reset email. Try again.');
  } finally {
    btn.disabled = false;
    content.textContent = 'Send Reset Link';
  }
}
</script>
</body>
</html>
