<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password — TEDxUAP Admin</title>
<link rel="stylesheet" href="../css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase-client.js"></script>
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg)">
<div style="width:100%;max-width:420px;padding:20px">
  <div class="detail-card" style="padding:44px 36px;position:relative;overflow:hidden;border-radius:24px">
    <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(137,0,0,.18),transparent 70%);pointer-events:none"></div>

    <div style="position:relative;z-index:1;text-align:center;margin-bottom:32px">
      <div><span class="nav-logo-ted" style="font-size:2rem">TED</span><span class="nav-logo-x" style="font-size:2rem">x</span></div>
      <div style="color:var(--text-faint);font-size:.66rem;letter-spacing:.15em;text-transform:uppercase;margin-top:4px">Admin Panel</div>
    </div>

    <h2 style="font-size:1.2rem;font-weight:700;text-align:center;margin-bottom:6px;position:relative;z-index:1">Set New Password</h2>
    <p style="color:var(--text-dim);font-size:.82rem;text-align:center;margin-bottom:28px;position:relative;z-index:1">Choose a strong password for your admin account.</p>

    <div id="msgBox" style="display:none;font-size:.8rem;padding:11px 14px;border-radius:10px;margin-bottom:18px;position:relative;z-index:1;line-height:1.5"></div>

    <div id="resetForm" style="position:relative;z-index:1">
      <div class="form-group" style="margin-bottom:16px">
        <label class="form-label" style="font-size:.78rem;margin-bottom:6px;display:block">New Password</label>
        <input type="password" id="newPass" class="form-input" placeholder="Min 8 characters" style="width:100%;box-sizing:border-box">
      </div>
      <div class="form-group" style="margin-bottom:22px">
        <label class="form-label" style="font-size:.78rem;margin-bottom:6px;display:block">Confirm Password</label>
        <input type="password" id="confirmPass" class="form-input" placeholder="Repeat password"
          onkeydown="if(event.key==='Enter') doUpdatePass()"
          style="width:100%;box-sizing:border-box">
      </div>
      <button onclick="doUpdatePass()" class="btn-primary" id="updateBtn" style="width:100%;justify-content:center">
        <span id="updateBtnContent">Update Password</span>
      </button>
    </div>

    <a href="index.html" style="display:block;text-align:center;color:var(--text-faint);font-size:.75rem;text-decoration:none;margin-top:24px;position:relative;z-index:1">← Back to Sign In</a>
  </div>
</div>
<script>
function showMsg(msg, type) {
  var el = document.getElementById('msgBox');
  el.innerHTML = msg;
  el.style.display = 'block';
  if (type === 'success') {
    el.style.background = 'rgba(34,197,94,.1)';
    el.style.border = '1px solid rgba(34,197,94,.3)';
    el.style.color = '#86efac';
  } else {
    el.style.background = 'rgba(220,38,38,.12)';
    el.style.border = '1px solid rgba(239,68,68,.3)';
    el.style.color = '#fca5a5';
  }
}

async function doUpdatePass() {
  var newPass = document.getElementById('newPass').value;
  var confirmPass = document.getElementById('confirmPass').value;

  if (newPass.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }
  if (newPass !== confirmPass) { showMsg('Passwords do not match.', 'error'); return; }

  var btn = document.getElementById('updateBtn');
  var content = document.getElementById('updateBtnContent');
  btn.disabled = true;
  content.innerHTML = '<span class="spinner" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></span>Updating…';

  try {
    if (!window.db.client) throw new Error('Not connected');
    const { error } = await window.db.client.auth.updateUser({ password: newPass });
    if (error) throw error;
    showMsg('✓ Password updated! Redirecting to login…', 'success');
    document.getElementById('resetForm').style.display = 'none';
    setTimeout(() => { window.location.href = 'index.html'; }, 2500);
  } catch(e) {
    showMsg(e.message || 'Could not update password. Try again.', 'error');
    btn.disabled = false;
    content.textContent = 'Update Password';
  }
}
</script>
</body>
</html>
