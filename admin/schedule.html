<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Schedule — TEDxUAP Admin</title>
<link rel="stylesheet" href="../css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/components.js"></script>
</head>
<body>
<div class="admin-overlay" id="adminOverlay" onclick="closeAdminSidebar()"></div>
<aside id="adminSidebar"></aside>
<div class="admin-main">
  <div id="adminTopbar"></div>
  <div class="admin-content">
    <div class="admin-table-wrap">
      <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
        <button class="admin-btn-primary" onclick="openModal(null)">+ Add Schedule Item</button>
      </div>
      <div style="overflow-x:auto">
        <table class="admin-table">
          <thead>
            <tr><th>Time</th><th>Title</th><th>Type</th><th>Session</th><th>Status</th><th style="width:180px">Actions</th></tr>
          </thead>
          <tbody id="tBody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-faint)"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="admin-modal-overlay" id="modal">
  <div class="admin-modal">
    <div class="admin-modal-header"><h3 id="modalTitle">Add Schedule Item</h3><button class="admin-modal-close" onclick="closeModal()">&times;</button></div>
    <div class="admin-modal-body">
      <input type="hidden" id="fId">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div class="form-group"><label class="form-label">Time *</label><input type="text" id="fTime" class="form-input" placeholder="09:00 AM"></div>
        <div class="form-group"><label class="form-label">Type</label>
          <select id="fType" class="form-input">
            <option value="session">Session</option>
            <option value="break">Break</option>
            <option value="logistics">Logistics</option>
            <option value="ceremony">Ceremony</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Session</label>
        <select id="fSession" class="form-input">
          <option value="morning">Morning</option>
          <option value="afternoon">Afternoon</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Title *</label><input type="text" id="fTitle" class="form-input"></div>
      <div class="form-group"><label class="form-label">Description</label><textarea id="fDesc" class="form-input" style="min-height:70px"></textarea></div>
      <div class="form-group">
        <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
          <input type="checkbox" id="fActive" checked style="accent-color:var(--red)"> Show on website
        </label>
      </div>
      <div class="form-group"><label class="form-label">Display Order</label><input type="number" id="fOrder" class="form-input" value="0" min="0"></div>
    </div>
    <div class="admin-modal-footer"><button class="admin-btn-secondary" onclick="closeModal()">Cancel</button><button class="admin-btn-primary" id="saveBtn">Save</button></div>
  </div>
</div>

<div class="admin-modal-overlay" id="delModal">
  <div class="admin-modal" style="max-width:380px">
    <div class="admin-modal-header"><h3>Delete Item</h3><button class="admin-modal-close" onclick="document.getElementById('delModal').classList.remove('show')">&times;</button></div>
    <div class="admin-modal-body"><p style="color:var(--text-dim)">Are you sure you want to delete this schedule item?</p></div>
    <div class="admin-modal-footer">
      <button class="admin-btn-secondary" onclick="document.getElementById('delModal').classList.remove('show')">Cancel</button>
      <button class="admin-btn-primary" id="delBtn" style="background:linear-gradient(135deg,#991b1b,#dc2626);box-shadow:0 0 20px rgba(220,38,38,.2)">Delete</button>
    </div>
  </div>
</div>

<script>
renderAdminSidebar('schedule'); renderAdminTopbar('Schedule');
const TABLE = 'event_schedule'; let delId = null;

(async function(){
    if(!await loadAdminUser()) return;
    loadMsgBadge(); load();
})();

async function load(){
    try {
        var items = await window.db.getAll(TABLE);
        var tb = document.getElementById('tBody');
        if(!items.length){ tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-faint)">No schedule items yet.</td></tr>'; return; }
        tb.innerHTML = items.map(function(s){
            var safe = encodeURIComponent(JSON.stringify(s));
            return '<tr>'+
            '<td style="font-weight:700;color:var(--red);font-size:.85rem">'+s.time+'</td>'+
            '<td style="font-weight:600">'+s.title+'</td>'+
            '<td><span style="font-size:.78rem;color:var(--text-dim);text-transform:capitalize">'+s.type+'</span></td>'+
            '<td><span style="font-size:.78rem;color:var(--text-dim);text-transform:capitalize">'+s.session+'</span></td>'+
            '<td><span class="admin-status '+(s.is_active?'active':'inactive')+'"><span class="admin-status-dot"></span>'+(s.is_active?'Active':'Hidden')+'</span></td>'+
            '<td><div class="admin-actions">'+
                '<button class="admin-btn-secondary" onclick=\'edit(JSON.parse(decodeURIComponent("'+safe+'")))\'>Edit</button>'+
                '<button class="admin-btn-secondary danger" onclick="confirmDel(\''+s.id+'\')">Delete</button>'+
            '</div></td></tr>';
        }).join('');
    } catch(e){ console.error(e); document.getElementById('tBody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:#fca5a5">Error loading schedule</td></tr>'; }
}

function openModal(d){
    document.getElementById('fId').value='';
    document.getElementById('fTime').value='';
    document.getElementById('fType').value='session';
    document.getElementById('fSession').value='morning';
    document.getElementById('fTitle').value='';
    document.getElementById('fDesc').value='';
    document.getElementById('fActive').checked=true;
    document.getElementById('fOrder').value='0';
    document.getElementById('modalTitle').textContent = d ? 'Edit Schedule Item' : 'Add Schedule Item';
    if(d){
        document.getElementById('fId').value=d.id;
        document.getElementById('fTime').value=d.time||'';
        document.getElementById('fType').value=d.type||'session';
        document.getElementById('fSession').value=d.session||'morning';
        document.getElementById('fTitle').value=d.title||'';
        document.getElementById('fDesc').value=d.description||'';
        document.getElementById('fActive').checked=!!d.is_active;
        document.getElementById('fOrder').value=d.order_index||0;
    }
    document.getElementById('modal').classList.add('show');
}
function closeModal(){ document.getElementById('modal').classList.remove('show'); }
function edit(d){ openModal(d); }
function confirmDel(id){ delId=id; document.getElementById('delModal').classList.add('show'); }

document.getElementById('delBtn').addEventListener('click', async function(){
    if(!delId) return; this.disabled=true; this.innerHTML='<span class="spinner"></span>';
    try{ await window.db.remove(TABLE, delId); adminToast('Deleted!','success'); document.getElementById('delModal').classList.remove('show'); load(); }
    catch(e){ adminToast(e.message,'error'); }
    finally{ delId=null; this.disabled=false; this.textContent='Delete'; }
});

document.getElementById('saveBtn').addEventListener('click', async function(){
    var btn=this, id=document.getElementById('fId').value;
    var time=document.getElementById('fTime').value.trim();
    var title=document.getElementById('fTitle').value.trim();
    if(!time||!title){ adminToast('Time and Title are required','error'); return; }
    btn.disabled=true; btn.innerHTML='<span class="spinner"></span>';
    try{
        var data={
            time, title,
            type:document.getElementById('fType').value,
            session:document.getElementById('fSession').value,
            description:document.getElementById('fDesc').value.trim(),
            is_active:document.getElementById('fActive').checked,
            order_index:parseInt(document.getElementById('fOrder').value)||0
        };
        if(id) await window.db.update(TABLE,id,data); else await window.db.create(TABLE,data);
        adminToast(id?'Updated!':'Added!','success'); closeModal(); load();
    }catch(e){ adminToast(e.message,'error'); }
    finally{ btn.disabled=false; btn.textContent='Save'; }
});
</script>
</body>
</html>
