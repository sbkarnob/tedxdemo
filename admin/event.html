<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Event Settings — TEDxUAP Admin</title>
<link rel="stylesheet" href="../css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/components.js"></script>
</head>
<body>
<div class="admin-overlay" id="adminOverlay" onclick="closeAdminSidebar()"></div>
<aside id="adminSidebar"></aside>
<div class="admin-main">
  <div id="adminTopbar"></div>
  <div class="admin-content">
    <div class="detail-card" style="max-width:700px">
      <h3 style="font-size:1rem;font-weight:700;margin-bottom:6px">Event Details</h3>
      <p style="font-size:.82rem;color:var(--text-dim);margin-bottom:24px">Update the information displayed on the public website.</p>
      <form id="eventForm">
        <div class="form-group"><label class="form-label">Event Theme</label><input type="text" id="fTheme" class="form-input"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="form-group"><label class="form-label">Date</label><input type="text" id="fDate" class="form-input" placeholder="TBA, 2026"></div>
          <div class="form-group"><label class="form-label">Time</label><input type="text" id="fTime" class="form-input" placeholder="9:00 AM"></div>
        </div>
        <div class="form-group"><label class="form-label">Doors Open</label><input type="text" id="fDoors" class="form-input" placeholder="8:30 AM"></div>
        <div class="form-group"><label class="form-label">Venue Name</label><input type="text" id="fVenue" class="form-input" placeholder="UAP Main Auditorium"></div>
        <div class="form-group"><label class="form-label">Full Address</label><input type="text" id="fAddress" class="form-input" placeholder="74/A Green Road, Farmgate, Dhaka 1205"></div>
        <div class="form-group"><label class="form-label">Capacity</label><input type="text" id="fCapacity" class="form-input" placeholder="500"></div>
        <div class="form-group"><label class="form-label">Ticket Status</label><select id="fTicket" class="form-input"><option value="opening_soon">Opening Soon</option><option value="open">Open</option><option value="sold_out">Sold Out</option><option value="closed">Closed</option></select></div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="fDesc" class="form-input" style="min-height:100px"></textarea></div>
        <button type="submit" class="admin-btn-primary" id="saveBtn" style="margin-top:8px">Save Changes</button>
      </form>
    </div>
  </div>
</div>

<script>
renderAdminSidebar('event');renderAdminTopbar('Event Details');
(async function(){
    if(!await loadAdminUser()) return;loadMsgBadge();
    try{
        var d=await window.db.getEventDetails();
        document.getElementById('fTheme').value=d.theme||'';
        document.getElementById('fDate').value=d.date||'';
        document.getElementById('fTime').value=d.time||'';
        document.getElementById('fDoors').value=d.doors_open||'';
        document.getElementById('fVenue').value=d.venue||'';
        document.getElementById('fAddress').value=d.address||'';
        document.getElementById('fCapacity').value=d.capacity||'';
        document.getElementById('fTicket').value=d.ticket_status||'opening_soon';
        document.getElementById('fDesc').value=d.description||'';
    }catch(e){console.error(e);}
})();

document.getElementById('eventForm').addEventListener('submit',async function(e){
    e.preventDefault();
    var btn=document.getElementById('saveBtn');
    btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Saving...';
    try{
        var updates={
            theme:document.getElementById('fTheme').value.trim(),
            date:document.getElementById('fDate').value.trim(),
            time:document.getElementById('fTime').value.trim(),
            doors_open:document.getElementById('fDoors').value.trim(),
            venue:document.getElementById('fVenue').value.trim(),
            address:document.getElementById('fAddress').value.trim(),
            capacity:document.getElementById('fCapacity').value.trim(),
            ticket_status:document.getElementById('fTicket').value,
            description:document.getElementById('fDesc').value.trim()
        };
        for(var k in updates){ await window.db.updateEventDetail(k, updates[k]); }
        adminToast('Event details saved!','success');
    }catch(e){adminToast(e.message,'error');}
    finally{btn.disabled=false;btn.textContent='Save Changes';}
});
</script>
</body>
</html>
