<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sponsors &amp; Partners — TEDxUAP Admin</title>
<link rel="stylesheet" href="../css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/components.js"></script>
</head>
<body>
<div class="admin-overlay" id="adminOverlay" onclick="closeAdminSidebar()"></div>
<aside id="adminSidebar"></aside>
<div class="admin-main">
  <div id="adminTopbar"></div>
  <div class="admin-content">

    <!-- Tabs: Sponsors vs Partners -->
    <div style="display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid rgba(255,255,255,.08)">
      <button class="admin-tab active" id="tabSponsors" onclick="switchKind('sponsor')">💎 Sponsors</button>
      <button class="admin-tab" id="tabPartners" onclick="switchKind('partner')">🤝 Partners</button>
    </div>

    <!-- Tier overview (Sponsors view only) -->
    <div id="tierStats" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:24px">
      <div class="admin-stat-card"><div class="admin-stat-icon">🏆</div><div class="admin-stat-value" id="cntPoweredBy">—</div><div class="admin-stat-label">Powered By</div></div>
      <div class="admin-stat-card"><div class="admin-stat-icon">💎</div><div class="admin-stat-value" id="cntPlatinum">—</div><div class="admin-stat-label">Platinum</div></div>
      <div class="admin-stat-card"><div class="admin-stat-icon">🥇</div><div class="admin-stat-value" id="cntGold">—</div><div class="admin-stat-label">Gold</div></div>
      <div class="admin-stat-card"><div class="admin-stat-icon">🥈</div><div class="admin-stat-value" id="cntSilver">—</div><div class="admin-stat-label">Silver</div></div>
      <div class="admin-stat-card"><div class="admin-stat-icon">🥉</div><div class="admin-stat-value" id="cntBronze">—</div><div class="admin-stat-label">Bronze</div></div>
    </div>

    <!-- Partner type chips (Partners view only) -->
    <div id="partnerTypeStats" style="display:none;flex-wrap:wrap;gap:10px;margin-bottom:24px"></div>

    <div class="admin-table-wrap">
      <!-- Toolbar: title, search, filter, add button -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:18px 18px 0">
        <div>
          <div style="font-size:1rem;font-weight:700" id="panelTitle">Sponsors</div>
          <div style="font-size:.78rem;color:var(--text-faint);margin-top:2px" id="totalLabel">Loading…</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <input type="text" id="searchBox" class="form-input" placeholder="Search…" style="width:200px" oninput="renderRows()">
          <select id="tierFilter" class="form-input" style="width:150px" onchange="renderRows()">
            <option value="">All tiers</option>
            <option value="powered_by">Powered By</option>
            <option value="platinum">Platinum</option>
            <option value="gold">Gold</option>
            <option value="silver">Silver</option>
            <option value="bronze">Bronze</option>
          </select>
          <select id="partnerTypeFilter" class="form-input" style="width:170px;display:none" onchange="renderRows()">
            <option value="">All partner types</option>
          </select>
          <button class="admin-btn-primary" id="addBtn" onclick="openModal()">+ Add Sponsor</button>
        </div>
      </div>

      <div style="overflow-x:auto;margin-top:14px">
        <table class="admin-table">
          <thead>
            <tr><th style="width:56px">Logo</th><th>Name</th><th id="thCategory">Tier</th><th>Website</th><th>Status</th><th style="width:200px">Actions</th></tr>
          </thead>
          <tbody id="tBody">
            <tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-faint)"><span class="spinner"></span></td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="admin-modal-overlay" id="modal">
  <div class="admin-modal">
    <div class="admin-modal-header"><h3 id="modalTitle">Add Sponsor</h3><button class="admin-modal-close" onclick="closeModal()">&times;</button></div>
    <div class="admin-modal-body">
      <form id="sForm" onsubmit="return false">
        <input type="hidden" id="fId">
        <input type="hidden" id="fKind">

        <!-- Sponsor vs Partner switch (only matters when adding new) -->
        <div class="form-group" id="kindSwitchGroup">
          <label class="form-label">This is a</label>
          <div style="display:flex;gap:10px">
            <label style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer" id="kindLabelSponsor">
              <input type="radio" name="kindRadio" value="sponsor" checked style="accent-color:var(--red)" onchange="onKindRadioChange()"> Sponsor <span style="color:var(--text-faint);font-size:.72rem">(tier-based)</span>
            </label>
            <label style="flex:1;display:flex;align-items:center;gap:8px;padding:10px 14px;border:1px solid rgba(255,255,255,.1);border-radius:10px;cursor:pointer" id="kindLabelPartner">
              <input type="radio" name="kindRadio" value="partner" style="accent-color:var(--red)" onchange="onKindRadioChange()"> Partner <span style="color:var(--text-faint);font-size:.72rem">(custom type)</span>
            </label>
          </div>
        </div>

        <div class="form-group"><label class="form-label">Logo</label>
          <div class="admin-image-upload" id="imgUp" onclick="document.getElementById('fImgFile').click()">
            <div id="imgPh"><div style="font-size:1.8rem;margin-bottom:6px">📷</div><span style="color:var(--red);font-weight:600">Click to upload</span><br><span style="font-size:.72rem;color:var(--text-faint)">PNG, JPG, WEBP max 2MB</span></div>
            <img id="imgPrev" style="display:none" alt="Preview">
          </div>
          <input type="file" id="fImgFile" accept="image/*" style="display:none" onchange="handleImg(event)">
          <input type="hidden" id="fImgUrl">
        </div>
        <div class="form-group"><label class="form-label">Name *</label><input type="text" id="fName" class="form-input" required placeholder="e.g. Acme Corporation"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div class="form-group" id="tierFieldGroup">
            <label class="form-label">Tier *</label>
            <select id="fTier" class="form-input">
              <option value="powered_by">Powered By</option>
              <option value="platinum">Platinum</option>
              <option value="gold">Gold</option>
              <option value="silver">Silver</option>
              <option value="bronze">Bronze</option>
            </select>
          </div>
          <div class="form-group" id="partnerTypeFieldGroup" style="display:none">
            <label class="form-label">Partner Type *</label>
            <input type="text" id="fPartnerType" class="form-input" placeholder="e.g. Gift Partner, News Partner">
            <datalist id="partnerTypeSuggestions"></datalist>
          </div>
          <div class="form-group"><label class="form-label">Display Order</label><input type="number" id="fOrder" class="form-input" value="0" min="0"></div>
        </div>

        <div class="form-group"><label class="form-label">Website</label><input type="url" id="fWeb" class="form-input" placeholder="https://..."></div>
        <div class="form-group">
          <label class="form-label" style="display:flex;align-items:center;gap:8px;cursor:pointer">
            <input type="checkbox" id="fActive" checked style="accent-color:var(--red)"> Show on website
          </label>
        </div>
      </form>
    </div>
    <div class="admin-modal-footer"><button class="admin-btn-secondary" onclick="closeModal()">Cancel</button><button class="admin-btn-primary" id="saveBtn" onclick="saveItem()">Save</button></div>
  </div>
</div>

<div class="admin-modal-overlay" id="delModal">
  <div class="admin-modal" style="max-width:380px">
    <div class="admin-modal-header"><h3>Delete</h3><button class="admin-modal-close" onclick="document.getElementById('delModal').classList.remove('show')">&times;</button></div>
    <div class="admin-modal-body"><p style="color:var(--text-dim)">Are you sure you want to delete <strong id="delName">this entry</strong>? This can't be undone.</p></div>
    <div class="admin-modal-footer"><button class="admin-btn-secondary" onclick="document.getElementById('delModal').classList.remove('show')">Cancel</button><button class="admin-btn-primary" id="delBtn" style="background:linear-gradient(135deg,#991b1b,#dc2626);box-shadow:0 0 20px rgba(220,38,38,.2)">Delete</button></div>
  </div>
</div>

<style>
.admin-tab{background:none;border:none;color:var(--text-faint);font-family:'Poppins',sans-serif;font-size:.85rem;font-weight:600;padding:10px 18px;cursor:pointer;border-bottom:2px solid transparent;transition:var(--transition)}
.admin-tab:hover{color:rgba(255,255,255,.8)}
.admin-tab.active{color:#fff;border-bottom-color:var(--red)}
.partner-type-chip{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:50px;padding:8px 16px;font-size:.78rem;color:rgba(255,255,255,.8)}
.partner-type-chip b{color:var(--red);font-weight:700}
</style>

<script>
renderAdminSidebar('sponsors');renderAdminTopbar('Sponsors & Partners');
const TABLE='sponsors';let imgFile=null,delId=null,allItems=[],currentKind='sponsor';

(async function(){
    if(!await loadAdminUser()) return;
    loadMsgBadge();
    if(new URLSearchParams(window.location.search).get('action')==='add') openModal();
    if(new URLSearchParams(window.location.search).get('view')==='partner') switchKind('partner');
    load();
})();

function switchKind(kind){
    currentKind=kind;
    document.getElementById('tabSponsors').classList.toggle('active',kind==='sponsor');
    document.getElementById('tabPartners').classList.toggle('active',kind==='partner');
    document.getElementById('tierStats').style.display=kind==='sponsor'?'grid':'none';
    document.getElementById('partnerTypeStats').style.display=kind==='partner'?'flex':'none';
    document.getElementById('tierFilter').style.display=kind==='sponsor'?'block':'none';
    document.getElementById('partnerTypeFilter').style.display=kind==='partner'?'block':'none';
    document.getElementById('thCategory').textContent=kind==='sponsor'?'Tier':'Partner Type';
    document.getElementById('panelTitle').textContent=kind==='sponsor'?'Sponsors':'Partners';
    document.getElementById('addBtn').textContent=kind==='sponsor'?'+ Add Sponsor':'+ Add Partner';
    document.getElementById('searchBox').placeholder=kind==='sponsor'?'Search sponsors…':'Search partners…';
    document.getElementById('searchBox').value='';
    document.getElementById('tierFilter').value='';
    document.getElementById('partnerTypeFilter').value='';
    renderRows();
}

async function load(){
    try{
        allItems=await window.db.getAll(TABLE);
        updateTierStats();
        updatePartnerTypeStats();
        renderRows();
    }catch(e){
        console.error(e);
        document.getElementById('tBody').innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:#fca5a5">Couldn\'t load data. Please refresh.</td></tr>';
        document.getElementById('totalLabel').textContent='Error loading';
    }
}

function updateTierStats(){
    var counts={powered_by:0,platinum:0,gold:0,silver:0,bronze:0};
    allItems.filter(function(s){return (s.kind||'sponsor')==='sponsor';}).forEach(function(s){ if(counts.hasOwnProperty(s.tier)) counts[s.tier]++; });
    document.getElementById('cntPoweredBy').textContent=counts.powered_by;
    document.getElementById('cntPlatinum').textContent=counts.platinum;
    document.getElementById('cntGold').textContent=counts.gold;
    document.getElementById('cntSilver').textContent=counts.silver;
    document.getElementById('cntBronze').textContent=counts.bronze;
}

function updatePartnerTypeStats(){
    var partners=allItems.filter(function(s){return s.kind==='partner';});
    var byType={};
    partners.forEach(function(p){
        var t=(p.partner_type||'Other').trim()||'Other';
        byType[t]=(byType[t]||0)+1;
    });
    var types=Object.keys(byType).sort();
    var box=document.getElementById('partnerTypeStats');
    box.innerHTML=types.length?types.map(function(t){return '<span class="partner-type-chip">'+t+' <b>'+byType[t]+'</b></span>';}).join(''):'<span style="color:var(--text-faint);font-size:.82rem">No partner types yet — add a partner to create one.</span>';

    // populate filter + datalist suggestions
    var filter=document.getElementById('partnerTypeFilter');
    var current=filter.value;
    filter.innerHTML='<option value="">All partner types</option>'+types.map(function(t){return '<option value="'+t+'">'+t+'</option>';}).join('');
    filter.value=current;
    document.getElementById('partnerTypeSuggestions').innerHTML=types.map(function(t){return '<option value="'+t+'">';}).join('');
}

function renderRows(){
    var q=document.getElementById('searchBox').value.trim().toLowerCase();
    var tierF=document.getElementById('tierFilter').value;
    var ptypeF=document.getElementById('partnerTypeFilter').value;

    var items=allItems.filter(function(s){
        var kind=s.kind||'sponsor';
        if(kind!==currentKind) return false;
        var matchesQ=!q || (s.name||'').toLowerCase().indexOf(q)!==-1;
        if(currentKind==='sponsor'){
            var matchesTier=!tierF || s.tier===tierF;
            return matchesQ && matchesTier;
        }else{
            var matchesType=!ptypeF || (s.partner_type||'')===ptypeF;
            return matchesQ && matchesType;
        }
    });

    var totalOfKind=allItems.filter(function(s){return (s.kind||'sponsor')===currentKind;}).length;
    var noun=currentKind==='sponsor'?'sponsor':'partner';
    document.getElementById('totalLabel').textContent=totalOfKind+' '+noun+(totalOfKind===1?'':'s')+' total'+(items.length!==totalOfKind?' · '+items.length+' shown':'');

    var tb=document.getElementById('tBody');

    if(!totalOfKind){
        var icon=currentKind==='sponsor'?'💎':'🤝';
        tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:48px 20px;color:var(--text-faint)">'+
            '<div style="font-size:1.8rem;margin-bottom:8px">'+icon+'</div>'+
            '<div style="font-weight:600;color:rgba(255,255,255,.7);margin-bottom:4px">No '+noun+'s yet</div>'+
            '<div style="font-size:.8rem;margin-bottom:16px">Add your first '+noun+' to show it on the website.</div>'+
            '<button class="admin-btn-primary" onclick="openModal()">+ Add '+(currentKind==='sponsor'?'Sponsor':'Partner')+'</button>'+
            '</td></tr>';
        return;
    }
    if(!items.length){
        tb.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-faint)">No '+noun+'s match your filters.</td></tr>';
        return;
    }

    var tierLabel={powered_by:'🏆 Powered By',platinum:'💎 Platinum',gold:'🥇 Gold',silver:'🥈 Silver',bronze:'🥉 Bronze'};

    tb.innerHTML=items.map(function(s){
        var safe=encodeURIComponent(JSON.stringify(s));
        var website=s.website_url?('<a href="'+s.website_url+'" target="_blank" rel="noopener" style="color:var(--red);font-size:.8rem;text-decoration:none">'+s.website_url.replace(/^https?:\/\//,'').replace(/\/$/,'')+' ↗</a>'):'<span style="color:var(--text-faint)">—</span>';
        var category=currentKind==='sponsor'
            ? '<span style="font-size:.78rem;color:var(--text-dim)">'+(tierLabel[s.tier]||s.tier)+'</span>'
            : '<span style="font-size:.78rem;color:var(--text-dim)">'+(s.partner_type||'—')+'</span>';
        return '<tr>'+
        '<td>'+(s.logo_url?'<img src="'+s.logo_url+'" class="admin-avatar" style="border-radius:8px;background:#fff">':'<div style="width:38px;height:38px;border-radius:8px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:1rem">'+(currentKind==='sponsor'?'💎':'🤝')+'</div>')+'</td>'+
        '<td style="font-weight:600">'+s.name+'</td>'+
        '<td>'+category+'</td>'+
        '<td>'+website+'</td>'+
        '<td><span class="admin-status '+(s.is_active?'active':'inactive')+'"><span class="admin-status-dot"></span>'+(s.is_active?'Active':'Hidden')+'</span></td>'+
        '<td><div class="admin-actions">'+
            '<button class="admin-btn-secondary" onclick=\'edit(JSON.parse(decodeURIComponent("'+safe+'")))\'>Edit</button>'+
            '<button class="admin-btn-secondary" onclick="toggle(\''+s.id+'\','+(!s.is_active)+')">'+(s.is_active?'Hide':'Show')+'</button>'+
            '<button class="admin-btn-secondary danger" onclick="confirmDel(\''+s.id+'\',\''+s.name.replace(/'/g,"\\'")+'\')">Delete</button>'+
        '</div></td></tr>';
    }).join('');
}

function onKindRadioChange(){
    var kind=document.querySelector('input[name="kindRadio"]:checked').value;
    document.getElementById('fKind').value=kind;
    document.getElementById('tierFieldGroup').style.display=kind==='sponsor'?'block':'none';
    document.getElementById('partnerTypeFieldGroup').style.display=kind==='partner'?'block':'none';
}

function openModal(d){
    document.getElementById('sForm').reset();document.getElementById('fId').value='';document.getElementById('fImgUrl').value='';imgFile=null;
    document.getElementById('imgPrev').style.display='none';document.getElementById('imgPh').style.display='block';document.getElementById('imgUp').classList.remove('has-image');
    document.getElementById('fActive').checked=true;

    var kind=d?(d.kind||'sponsor'):currentKind;
    document.getElementById('fKind').value=kind;
    document.querySelector('input[name="kindRadio"][value="'+kind+'"]').checked=true;
    document.getElementById('tierFieldGroup').style.display=kind==='sponsor'?'block':'none';
    document.getElementById('partnerTypeFieldGroup').style.display=kind==='partner'?'block':'none';
    // Lock the kind switch when editing — switching category after creation gets confusing
    document.getElementById('kindSwitchGroup').style.display=d?'none':'block';

    document.getElementById('modalTitle').textContent=(d?'Edit ':'Add ')+(kind==='sponsor'?'Sponsor':'Partner');
    if(d){
        document.getElementById('fId').value=d.id;document.getElementById('fName').value=d.name||'';
        document.getElementById('fTier').value=d.tier||'bronze';
        document.getElementById('fPartnerType').value=d.partner_type||'';
        document.getElementById('fWeb').value=d.website_url||'';
        document.getElementById('fOrder').value=d.order_index||0;document.getElementById('fImgUrl').value=d.logo_url||'';
        document.getElementById('fActive').checked=d.is_active!==false;
        if(d.logo_url){document.getElementById('imgPrev').src=d.logo_url;document.getElementById('imgPrev').style.display='block';document.getElementById('imgPh').style.display='none';document.getElementById('imgUp').classList.add('has-image');}
    }else{
        document.getElementById('fTier').value='bronze';
        document.getElementById('fPartnerType').value='';
    }
    document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
function edit(d){openModal(d);}
function handleImg(e){
    var f=e.target.files[0];if(!f)return;
    if(!CONFIG.ALLOWED_IMAGE_TYPES.includes(f.type)){adminToast('Please use a PNG, JPG, or WEBP file','error');return;}
    if(f.size>CONFIG.MAX_IMAGE_SIZE){adminToast('Image must be under 2MB','error');return;}
    imgFile=f;var r=new FileReader();
    r.onload=function(ev){document.getElementById('imgPrev').src=ev.target.result;document.getElementById('imgPrev').style.display='block';document.getElementById('imgPh').style.display='none';document.getElementById('imgUp').classList.add('has-image');};
    r.readAsDataURL(f);
}

async function saveItem(){
    var btn=document.getElementById('saveBtn'),id=document.getElementById('fId').value;
    var name=document.getElementById('fName').value.trim();
    var kind=document.getElementById('fKind').value;
    if(!name){adminToast('Name is required','error');return;}
    var partnerType='';
    if(kind==='partner'){
        partnerType=document.getElementById('fPartnerType').value.trim();
        if(!partnerType){adminToast('Partner type is required, e.g. "Gift Partner"','error');return;}
    }
    btn.disabled=true;var oldLabel=btn.textContent;btn.innerHTML='<span class="spinner"></span>';
    try{
        var imgUrl=document.getElementById('fImgUrl').value;
        if(imgFile) imgUrl=await window.db.uploadImage(imgFile,'sponsors');
        var data={
            name:name,
            kind:kind,
            tier:kind==='sponsor'?document.getElementById('fTier').value:null,
            partner_type:kind==='partner'?partnerType:null,
            website_url:document.getElementById('fWeb').value.trim()||null,
            logo_url:imgUrl,
            order_index:parseInt(document.getElementById('fOrder').value)||0,
            is_active:document.getElementById('fActive').checked
        };
        if(id) await window.db.update(TABLE,id,data); else await window.db.create(TABLE,data);
        adminToast(id?'Updated!':'Added!','success');closeModal();load();
    }catch(e){adminToast(e.message||'Something went wrong','error');}
    finally{btn.disabled=false;btn.textContent=oldLabel;}
}

async function toggle(id,v){
    try{await window.db.update(TABLE,id,{is_active:v});adminToast(v?'Now shown on website':'Now hidden from website','success');load();}
    catch(e){adminToast(e.message||'Something went wrong','error');}
}

function confirmDel(id,name){
    delId=id;
    document.getElementById('delName').textContent=name||'this entry';
    document.getElementById('delModal').classList.add('show');
}
document.getElementById('delBtn').addEventListener('click',async function(){
    if(!delId)return;this.disabled=true;this.innerHTML='<span class="spinner"></span>';
    try{await window.db.remove(TABLE,delId);adminToast('Deleted','success');document.getElementById('delModal').classList.remove('show');load();}
    catch(e){adminToast(e.message||'Something went wrong','error');}
    finally{delId=null;this.disabled=false;this.textContent='Delete';}
});
</script>
</body>
</html>
