<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Organizers — TEDxUAP 2026</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Crect width='40' height='40' rx='6' fill='%23050709'/%3E%3Ctext x='4' y='28' font-family='Arial Black' font-weight='900' font-size='14' fill='white'%3ETED%3C/text%3E%3Ctext x='30' y='28' font-family='Arial Black' font-weight='900' font-size='14' fill='%23FF0000'%3Ex%3C/text%3E%3C/svg%3E"/>
<link rel="stylesheet" href="css/styles.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/components.js"></script>
<script src="js/app.js"></script>
</head>
<body>
<div id="site-header"></div>

<div class="page-hero">
  <div class="page-hero-bg"></div>
  <div class="page-hero-grid"></div>
  <div class="container" style="position:relative;z-index:1;text-align:center">
    <span class="section-tag">The Team Behind</span>
    <div class="divider" style="margin:12px auto"></div>
    <h1 style="font-size:clamp(2.2rem,6vw,4rem);font-weight:900;letter-spacing:-.03em;margin-bottom:14px">Our <span style="color:#FF0000">Organizers</span></h1>
    <p style="color:var(--text-dim);font-size:.95rem;max-width:480px;margin:0 auto;line-height:1.7;font-weight:300">Passionate students who gave months of their lives to make one incredible day happen.</p>
  </div>
</div>

<section class="section" style="padding-top:40px">
  <div class="container">
    <div class="reveal" style="font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-faint);margin-bottom:28px;text-align:center">Core Organizing Team</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:80px" id="orgGrid">
      <div style="grid-column:1/-1;text-align:center;padding:60px;color:var(--text-faint)"><span class="spinner"></span></div>
    </div>

    <div class="reveal" style="text-align:center;margin-bottom:40px">
      <span class="section-tag">The Heartbeat</span>
      <div class="divider" style="margin:12px auto"></div>
      <h2 style="font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800">Event <span style="color:#FF0000">Volunteers</span></h2>
      <p style="color:var(--text-dim);font-size:.88rem;max-width:400px;margin:10px auto 0;line-height:1.7">The incredible team working behind the scenes.</p>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px" id="volGrid">
      <div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text-faint)"><span class="spinner"></span></div>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script>

function makeSlug(name) {
    return (name || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

renderHeader('organizers');
renderFooter();

(async function() {
    try {
        let retries = 0;
        while (!window.db.client && retries < 20) { await new Promise(r => setTimeout(r, 100)); retries++; }
        const [orgs, vols] = window.db.client
            ? await Promise.all([window.db.getActive('organizers'), window.db.getActive('volunteers')])
            : [[], []];

        const orgGrid = document.getElementById('orgGrid');
        orgGrid.innerHTML = orgs.length ? orgs.map((o, i) => `
          <div class="org-card reveal" style="transition-delay:${(i%3)*.1}s">
            <div class="org-card-img"><img src="${o.photo_url || o.image_url || ''}" alt="${o.name}" loading="lazy"><div style="position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(5,7,13,.9))"></div></div>
            <div class="org-card-body">
              <div style="font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:5px;font-weight:600">${o.role}</div>
              <h3 style="font-size:1rem;font-weight:700;margin-bottom:6px">${o.name}</h3>
              <p style="font-size:.78rem;color:var(--text-dim);line-height:1.6;margin-bottom:14px">${(o.bio || o.description || '').split('. ').slice(0,2).join('. ')}</p>
              <a href="/organizer-details/${makeSlug(o.name)}" class="btn-sm">View Profile <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
            </div>
          </div>`).join('')
          : '<p style="grid-column:1/-1;text-align:center;color:var(--text-faint);padding:40px">Team coming soon...</p>';

        const volGrid = document.getElementById('volGrid');
        volGrid.innerHTML = vols.length ? vols.map((v, i) => `
          <div class="vol-card reveal" style="transition-delay:${(i%6)*.05}s">
            <img src="${v.photo_url || v.image_url || ''}" alt="${v.name}" loading="lazy">
            <div style="padding:12px 10px">
              <div style="font-size:.82rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.name}</div>
              <div style="font-size:.66rem;color:var(--text-faint);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${v.role}</div>
            </div>
          </div>`).join('')
          : '<p style="grid-column:1/-1;text-align:center;color:var(--text-faint);padding:40px">Volunteers coming soon...</p>';

        initReveals();
    } catch(e) {
        document.getElementById('orgGrid').innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-faint);padding:40px">Team coming soon...</p>';
        document.getElementById('volGrid').innerHTML = '<p style="grid-column:1/-1;text-align:center;color:var(--text-faint);padding:40px">Volunteers coming soon...</p>';
    }
})();
</script>
</body>
</html>
